<!doctype html>

<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ethereal Kiosk - Rating</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#4350ae",
              "on-background": "#191c1e",
              "surface-bright": "#f7f9fb",
              "on-primary-fixed": "#001a40",
              "on-error": "#ffffff",
              "on-primary": "#ffffff",
              "surface-dim": "#d8dadc",
              "on-secondary-fixed": "#001f24",
              "on-secondary-fixed-variant": "#004f58",
              "surface-container-high": "#e6e8ea",
              "surface-container": "#eceef0",
              "surface-variant": "#e0e3e5",
              "secondary-fixed-dim": "#00daf3",
              background: "#f7f9fb",
              "surface-tint": "#115cb9",
              "surface-container-low": "#f2f4f6",
              "inverse-on-surface": "#eff1f3",
              "outline-variant": "#c2c6d4",
              tertiary: "#2a3795",
              "on-tertiary-fixed-variant": "#303c9a",
              "on-surface-variant": "#424752",
              error: "#ba1a1a",
              secondary: "#006875",
              "on-tertiary-container": "#c8cdff",
              "secondary-fixed": "#9cf0ff",
              "error-container": "#ffdad6",
              "primary-fixed": "#d7e2ff",
              "on-secondary-container": "#00616d",
              "inverse-primary": "#acc7ff",
              "surface-container-lowest": "#ffffff",
              primary: "#003f87",
              "on-tertiary-fixed": "#000c62",
              "surface-container-highest": "#e0e3e5",
              "secondary-container": "#00e3fd",
              "primary-container": "#0056b3",
              "primary-fixed-dim": "#acc7ff",
              "tertiary-fixed": "#dfe0ff",
              surface: "#f7f9fb",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#bcc2ff",
              "on-tertiary": "#ffffff",
              "on-surface": "#191c1e",
              "on-secondary": "#ffffff",
              "on-primary-container": "#bbd0ff",
              outline: "#727784",
              "inverse-surface": "#2d3133",
              "on-primary-fixed-variant": "#004491",
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Public Sans"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      }
    </script>
    <style>
      .glass-panel {
        backdrop-filter: blur(32px) saturate(150%);
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 48;
      }
      .star-active {
        font-variation-settings: "FILL" 1;
        color: #00e3fd;
        filter: drop-shadow(0 0 10px rgba(0, 227, 253, 0.4));
      }
      body {
        background: radial-gradient(
          circle at top right,
          #bbd0ff 0%,
          #f7f9fb 50%,
          #d7e2ff 100%
        );
        min-height: 100vh;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="font-body text-on-surface antialiased overflow-hidden">
    <!-- Top Navigation Bar (Shared Component) -->
    <nav
      class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 bg-white/40 dark:bg-slate-900/40 backdrop-blur-[32px] rounded-b-[32px] shadow-xl shadow-blue-900/5"
    >
      <div class="flex items-center gap-3">
        <span
          class="material-symbols-outlined text-blue-800 dark:text-blue-300 text-3xl"
          data-icon="account_balance"
          >account_balance</span
        >
        <span
          class="text-2xl font-black text-blue-900 dark:text-white tracking-tighter font-headline"
          >ETHÉREAL</span
        >
      </div>
      <div class="flex items-center gap-6">
        <button
          class="text-slate-600 dark:text-slate-400 font-bold hover:bg-white/20 transition-all px-4 py-2 rounded-full"
        >
          UZ|RU|EN
        </button>
      </div>
    </nav>
    <!-- Main Content Canvas -->
    <main class="flex items-center justify-center min-h-screen p-6">
      <!-- Rating Modal Card -->
      <div
        class="relative w-full max-w-2xl bg-surface-container-lowest/60 glass-panel rounded-xl p-12 shadow-2xl shadow-primary/5 flex flex-col items-center text-center"
      >
        <!-- Close/Back Action (Suppresses Nav Shell Logic) -->
        <button
          class="absolute top-8 right-8 w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high/40 hover:bg-surface-container-high transition-colors"
        >
          <span class="material-symbols-outlined" data-icon="close">close</span>
        </button>
        <!-- Illustration Area -->
        <div
          class="mb-10 w-32 h-32 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/20"
        >
          <span
            class="material-symbols-outlined text-white text-6xl"
            data-icon="star_rate"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >star_rate</span
          >
        </div>
        <!-- Headline -->
        <h1
          class="font-headline text-4xl font-black text-primary tracking-tight mb-4"
        >
          Xizmatni baholang
        </h1>
        <p class="text-on-surface-variant text-lg max-w-md mb-12">
          Fikringiz biz uchun muhim. Xizmat sifatini yaxshilashga yordam bering.
        </p>
        <!-- Star Rating System -->
        <div class="flex gap-4 mb-12">
          <button class="group">
            <span
              class="material-symbols-outlined text-6xl star-active transition-transform group-hover:scale-110 active:scale-95"
              data-icon="star"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >star</span
            >
          </button>
          <button class="group">
            <span
              class="material-symbols-outlined text-6xl star-active transition-transform group-hover:scale-110 active:scale-95"
              data-icon="star"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >star</span
            >
          </button>
          <button class="group">
            <span
              class="material-symbols-outlined text-6xl star-active transition-transform group-hover:scale-110 active:scale-95"
              data-icon="star"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >star</span
            >
          </button>
          <button class="group">
            <span
              class="material-symbols-outlined text-6xl star-active transition-transform group-hover:scale-110 active:scale-95"
              data-icon="star"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >star</span
            >
          </button>
          <button class="group">
            <span
              class="material-symbols-outlined text-6xl text-outline-variant transition-transform group-hover:scale-110 active:scale-95"
              data-icon="star"
              >star</span
            >
          </button>
        </div>
        <!-- Glassy Comment Input -->
        <div class="w-full mb-10">
          <textarea
            class="w-full h-32 bg-surface-container-highest/30 border-none focus:ring-2 focus:ring-secondary-container rounded-lg p-6 text-on-surface placeholder:text-outline text-lg transition-all"
            placeholder="Qo'shimcha fikr va mulohazalaringiz..."
          ></textarea>
        </div>
        <!-- Submit Button (Glowing sapphire jewel) -->
        <button
          class="w-full py-6 rounded-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-xl tracking-wide shadow-[0_0_20px_rgba(0,63,135,0.3)] hover:shadow-[0_0_40px_rgba(0,104,117,0.4)] transition-all active:scale-[0.98]"
        >
          Yuborish
        </button>
      </div>
    </main>
    <!-- Animated Background Vector Elements -->
    <div
      class="fixed top-1/4 -left-20 w-96 h-96 bg-primary/10 rounded-full blur-[100px] -z-10 animate-pulse"
    ></div>
    <div
      class="fixed bottom-1/4 -right-20 w-[30rem] h-[30rem] bg-secondary-container/10 rounded-full blur-[120px] -z-10 animate-pulse"
      style="animation-delay: 2s"
    ></div>
    <!-- Bottom Navigation (Shared Component - Inactive state for this transactional focus) -->
    <!-- Suppression logic: This is a task-focused screen with a close action, hence Nav is visible but dimmed or partially hidden. Keeping it for kiosk context visibility. -->
    <footer
      class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center px-6 py-4 bg-white/40 dark:bg-slate-900/40 backdrop-blur-[40px] rounded-[48px] mb-8 mx-auto w-[90%] max-w-lg shadow-2xl shadow-blue-900/10"
    >
      <a
        class="flex items-center justify-center text-blue-900/60 dark:text-slate-300 p-4 hover:scale-110 transition-transform"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="home">home</span>
      </a>
      <a
        class="flex items-center justify-center text-blue-900/60 dark:text-slate-300 p-4 hover:scale-110 transition-transform"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="search">search</span>
      </a>
      <a
        class="flex items-center justify-center bg-gradient-to-br from-blue-700 to-blue-500 text-white rounded-full p-4 shadow-[0_0_20px_rgba(0,86,179,0.4)] hover:scale-110 transition-transform"
        href="#"
      >
        <span
          class="material-symbols-outlined"
          data-icon="pending_actions"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >pending_actions</span
        >
      </a>
      <a
        class="flex items-center justify-center text-blue-900/60 dark:text-slate-300 p-4 hover:scale-110 transition-transform"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="help_center"
          >help_center</span
        >
      </a>
    </footer>
  </body>
</html>
